<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App - Adsgram Task</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .card {
            text-align: center;
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 90%;
        }
        .counter-container {
            background: #e8f0fe;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #1a73e8;
        }
        #count-value {
            font-size: 24px;
            display: block;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        /* Adsgram Task Styling */
        .task {
            --adsgram-task-button-width: 100%;
            --adsgram-task-font-size: 16px;
            margin-top: 10px;
        }

        /* Custom Button Style to match previous design */
        .custom-btn {
            background: linear-gradient(135deg, #0088cc, #00a2ff);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
            width: 100%;
            display: inline-block;
            text-decoration: none;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
            min-height: 20px;
        }
        #timer-text {
            font-weight: bold;
            color: #e74c3c;
        }
        .hidden {
            display: none;
        }
    </style>
    
    <!-- Adsgram Task SDK Script -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>
<body>

    <div class="card">
        <div class="counter-container">
            Muvaffaqiyatli ko'rildi:
            <span id="count-value">0</span>
        </div>
        
        <h2>Adsgram Task</h2>

        <!-- Adsgram Task Web Component -->
        <div id="task-wrapper">
            <adsgram-task
               data-block-id='task-28471'
               class="task"
               id="my-task"
            >
                <div slot="button" class="custom-btn">Ko'rish</div>
            </adsgram-task>
        </div>

        <p id="status"></p>
    </div>

    <script>
        const taskElement = document.getElementById('my-task');
        const taskWrapper = document.getElementById('task-wrapper');
        const statusText = document.getElementById('status');
        const countDisplay = document.getElementById('count-value');

        let successCount = localStorage.getItem('adSuccessCount') || 0;
        countDisplay.innerText = successCount;

        function startTimer(seconds) {
            taskWrapper.classList.add('hidden'); // Taskni yashirish
            let timeLeft = seconds;
            
            const timerInterval = setInterval(() => {
                statusText.innerHTML = `Keyingi reklama uchun <span id="timer-text">${timeLeft}</span> soniya kuting`;
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(timerInterval);
                    taskWrapper.classList.remove('hidden'); // Taskni qayta ko'rsatish
                    statusText.innerText = "Tayyor! Reklamani ko'rishingiz mumkin.";
                }
            }, 1000);
        }

        // Adsgram Task hodisalariga obuna bo'lish
        taskElement.addEventListener('reward', () => {
            // Foydalanuvchi vazifani bajardi va mukofot oldi
            successCount++;
            localStorage.setItem('adSuccessCount', successCount);
            countDisplay.innerText = successCount;
            
            statusText.innerText = "Muvaffaqiyatli! Mukofot berildi.";
            
            // 20 soniyalik kutishni boshlash
            startTimer(20);
        });

        taskElement.addEventListener('onError', (e) => {
            statusText.innerText = "Xatolik yuz berdi.";
            console.error('Adsgram Task Error:', e);
        });

        taskElement.addEventListener('onBannerNotFound', () => {
            statusText.innerText = "Hozircha reklama topilmadi.";
        });
    </script>

</body>
</html>
