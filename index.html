<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App - Monetag Rewarded</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .card {
            text-align: center;
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 90%;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        #watch-btn {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(110, 142, 251, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #watch-btn:active {
            transform: scale(0.95);
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
            min-height: 20px;
        }
    </style>
    
    <!-- Yangi Monetag SDK Script -->
    <script src='//libtl.com/sdk.js' data-zone='10911940' data-sdk='show_10911940'></script>
</head>
<body>

    <div class="card">
        <h2>Reklama Ko'rish</h2>
        <button id="watch-btn">Ko'rish</button>
        <p id="status"></p>
    </div>

    <script>
        const watchBtn = document.getElementById('watch-btn');
        const statusText = document.getElementById('status');

        watchBtn.addEventListener('click', () => {
            statusText.innerText = "Reklama yuklanmoqda...";
            
            // Monetag Rewarded Popup funksiyasi (SDK orqali taqdim etilgan)
            if (typeof show_10911940 === 'function') {
                show_10911940('pop').then(() => {
                    // Foydalanuvchi reklamani oxirigacha ko'rdi yoki yopdi
                    statusText.innerText = "Muvaffaqiyatli! Mukofot berildi.";
                    console.log('Ad finished');
                }).catch(e => {
                    // Xatolik yuz berdi
                    statusText.innerText = "Xatolik: Reklama yuklanmadi.";
                    console.error('Ad error:', e);
                });
            } else {
                statusText.innerText = "SDK yuklanmadi. Iltimos, sahifani yangilang.";
            }
        });
    </script>

</body>
</html>
