<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adsgram Mobile App</title>
    <style>
        :root {
            --primary-color: #0088cc;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px 20px;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .counter-container {
            background: #eef7ff;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #d0e8ff;
        }

        .counter-label {
            font-size: 14px;
            color: var(--primary-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #count-value {
            font-size: 32px;
            font-weight: 800;
            display: block;
            margin-top: 5px;
            color: var(--primary-color);
        }

        h2 {
            font-size: 22px;
            margin: 0 0 10px 0;
            word-wrap: break-word; /* Uzun sarlavhalar uchun */
            overflow-wrap: break-word;
            line-height: 1.3;
        }

        .description {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 25px;
            line-height: 1.5;
        }
        
        /* Adsgram Task Styling */
        .task {
            --adsgram-task-button-width: 100%;
            --adsgram-task-font-size: 16px;
            --adsgram-task-icon-size: 48px;
            display: block;
            width: 100%;
            text-align: left;
        }

        .custom-btn {
            background: linear-gradient(135deg, #0088cc, #00a2ff);
            color: white;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.3);
            width: 100%;
            display: block;
            transition: all 0.2s ease;
            outline: none;
        }

        .custom-btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 8px rgba(0, 136, 204, 0.2);
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-sub);
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
        }

        #timer-text {
            font-weight: 700;
            color: #e74c3c;
            margin: 0 4px;
        }

        .hidden {
            display: none !important;
        }

        /* Toast Notifications */
        #notification-container {
            position: fixed;
            top: env(safe-area-inset-top, 20px);
            left: 15px;
            right: 15px;
            z-index: 10000;
        }

        .toast {
            background: #333;
            color: white;
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.error { background: #ff4757; }
        .toast.success { background: #2ed573; }
        .toast.info { background: #1e90ff; }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }
    </style>
    
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>
<body>

    <div id="notification-container"></div>

    <div class="card">
        <div class="counter-container">
            <span class="counter-label">Muvaffaqiyatli</span>
            <span id="count-value">0</span>
        </div>
        
        <h2>Adsgram Debug Task: Long Title Example That Wraps Properly</h2>
        <p class="description">Reklamani ko'ring va mukofotga ega bo'ling. Har bir ko'rishdan so'ng 20 soniya kuting.</p>

        <div id="task-wrapper">
            <adsgram-task
               data-block-id='task-28471'
               class="task"
               id="my-task"
               data-debug="true"
            >
                <div slot="button" class="custom-btn">Reklamani ko'rish</div>
            </adsgram-task>
        </div>

        <div id="status">SDK yuklanmoqda...</div>
    </div>

    <script>
        const taskElement = document.getElementById('my-task');
        const taskWrapper = document.getElementById('task-wrapper');
        const statusText = document.getElementById('status');
        const countDisplay = document.getElementById('count-value');
        const notificationContainer = document.getElementById('notification-container');

        let successCount = parseInt(localStorage.getItem('adSuccessCount')) || 0;
        countDisplay.innerText = successCount;

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            notificationContainer.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.5s forwards';
                setTimeout(() => toast.remove(), 500);
            }, 3500);
        }

        window.onload = () => {
            if (window.Adsgram || document.querySelector('adsgram-task')) {
                statusText.innerText = "Reklama ko'rishga tayyor";
                showToast("SDK muvaffaqiyatli yuklandi", "success");
            } else {
                statusText.innerText = "SDK yuklanmadi";
                showToast("SDK ulanish xatosi!", "error");
            }
        };

        function startTimer(seconds) {
            taskWrapper.classList.add('hidden');
            let timeLeft = seconds;
            
            const timerInterval = setInterval(() => {
                statusText.innerHTML = `Keyingi reklama: <span id="timer-text">${timeLeft}s</span>`;
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(timerInterval);
                    taskWrapper.classList.remove('hidden');
                    statusText.innerText = "Yangi reklama tayyor!";
                    showToast("Kutish vaqti tugadi", "info");
                }
            }, 1000);
        }

        taskElement.addEventListener('reward', () => {
            successCount++;
            localStorage.setItem('adSuccessCount', successCount);
            countDisplay.innerText = successCount;
            
            statusText.innerText = "Mukofot berildi!";
            showToast("Vazifa bajarildi!", "success");
            
            startTimer(20);
        });

        taskElement.addEventListener('onError', (e) => {
            const errorMsg = e.detail?.description || "Xatolik yuz berdi";
            statusText.innerText = "Xatolik yuz berdi";
            showToast(`Xato: ${errorMsg}`, "error");
        });

        taskElement.addEventListener('onBannerNotFound', () => {
            statusText.innerText = "Reklama topilmadi";
            showToast("Hozircha reklama yo'q", "info");
        });
    </script>

</body>
</html>
