<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App - Reklama Hisoblagichi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .card {
            text-align: center;
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 90%;
            position: relative;
        }
        .counter-container {
            background: #e8f0fe;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #1a73e8;
        }
        #count-value {
            font-size: 24px;
            display: block;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 20px;
        }
        #watch-btn {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(110, 142, 251, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        #watch-btn:active {
            transform: scale(0.95);
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
            min-height: 20px;
        }
    </style>
    
    <!-- Monetag SDK Script -->
    <script src='//libtl.com/sdk.js' data-zone='10911940' data-sdk='show_10911940'></script>
</head>
<body>

    <div class="card">
        <div class="counter-container">
            Muvaffaqiyatli ko'rildi:
            <span id="count-value">0</span>
        </div>
        
        <h2>Reklama Ko'rish</h2>
        <button id="watch-btn">Ko'rish</button>
        <p id="status"></p>
    </div>

    <script>
        const watchBtn = document.getElementById('watch-btn');
        const statusText = document.getElementById('status');
        const countDisplay = document.getElementById('count-value');

        // LocalStorage orqali hisobni saqlab qolish (sahifa yangilansa ham o'chib ketmaydi)
        let successCount = localStorage.getItem('adSuccessCount') || 0;
        countDisplay.innerText = successCount;

        watchBtn.addEventListener('click', () => {
            statusText.innerText = "Reklama yuklanmoqda...";
            
            if (typeof show_10911940 === 'function') {
                show_10911940('pop').then(() => {
                    // Muvaffaqiyatli ko'rilganda hisobni oshirish
                    successCount++;
                    localStorage.setItem('adSuccessCount', successCount);
                    countDisplay.innerText = successCount;
                    
                    statusText.innerText = "Muvaffaqiyatli! Mukofot berildi.";
                    console.log('Ad finished successfully');
                }).catch(e => {
                    statusText.innerText = "Xatolik: Reklama yuklanmadi.";
                    console.error('Ad error:', e);
                });
            } else {
                statusText.innerText = "SDK yuklanmadi. Iltimos, sahifani yangilang.";
            }
        });
    </script>

</body>
</html>
