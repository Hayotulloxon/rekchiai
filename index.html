<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App - Adsgram Reklama</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .card {
            text-align: center;
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 90%;
        }
        .counter-container {
            background: #e8f0fe;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            color: #1a73e8;
        }
        #count-value {
            font-size: 24px;
            display: block;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 20px;
        }
        #watch-btn {
            background: linear-gradient(135deg, #0088cc, #00a2ff);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.4);
            transition: all 0.2s;
            width: 100%;
        }
        #watch-btn:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
            min-height: 20px;
        }
        #timer-text {
            font-weight: bold;
            color: #e74c3c;
        }
    </style>
    
    <!-- Adsgram SDK Script -->
    <script src="https://sad.adsgram.ai/js/adsgram-ad-sdk.js"></script>
</head>
<body>

    <div class="card">
        <div class="counter-container">
            Muvaffaqiyatli ko'rildi:
            <span id="count-value">0</span>
        </div>
        
        <h2>Adsgram Reklama</h2>
        <button id="watch-btn">Ko'rish</button>
        <p id="status"></p>
    </div>

    <script>
        const watchBtn = document.getElementById('watch-btn');
        const statusText = document.getElementById('status');
        const countDisplay = document.getElementById('count-value');

        // Adsgram Controllerini sozlash
        const AdController = window.Adsgram.init({ blockId: "28471" });

        let successCount = localStorage.getItem('adSuccessCount') || 0;
        countDisplay.innerText = successCount;

        function startTimer(seconds) {
            watchBtn.disabled = true;
            let timeLeft = seconds;
            
            const timerInterval = setInterval(() => {
                statusText.innerHTML = `Keyingi reklama uchun <span id="timer-text">${timeLeft}</span> soniya kuting`;
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(timerInterval);
                    watchBtn.disabled = false;
                    statusText.innerText = "Tayyor! Reklamani ko'rishingiz mumkin.";
                }
            }, 1000);
        }

        watchBtn.addEventListener('click', () => {
            statusText.innerText = "Reklama yuklanmoqda...";
            
            // Adsgram reklamani ko'rsatish
            AdController.show().then((result) => {
                // Foydalanuvchi reklamani oxirigacha ko'rdi
                successCount++;
                localStorage.setItem('adSuccessCount', successCount);
                countDisplay.innerText = successCount;
                
                // 20 soniyalik kutishni boshlash
                startTimer(20);
            }).catch((result) => {
                // Xatolik yoki foydalanuvchi reklamani yopib yubordi
                if (result.error) {
                    statusText.innerText = "Xatolik: Reklama yuklanmadi.";
                    console.error('Adsgram error:', result.description);
                } else {
                    statusText.innerText = "Reklama to'liq ko'rilmadi.";
                }
            });
        });
    </script>

</body>
</html>
